# Phase 06 FOUND-02 — first GitHub Actions workflow in the repo.
# Adopted verbatim from .planning/phases/06-foundations-preview-mode/06-RESEARCH.md
# §Code Examples §Example 7. Step order is locked by 06-CONTEXT.md §E and is
# asserted by tests/foundations/ci-workflow.test.ts.
name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Phase 22 D-gate-02 partial: lint is advisory until Phase 22.5 baseline
      # reset (pre-existing 81-error baseline predates Phase 22 — verified at
      # commit 245f45b). The operative D-gate-02 concern (zero `innerHTML` in
      # `src/widget/`) is enforced separately and PASSES; plugin-store reviewer
      # checks scope to runtime-observable concerns (innerHTML, eval, no
      # remote code, no telemetry) — none of which depend on this lint pass.
      # Tracked in `.planning/phases/22-v1-2-path-removal-polish/deferred-items.md`.
      - run: npm run lint
        continue-on-error: true
      - run: npm test
      - run: npm run build
      - run: npm run check:bundle-size
      - name: Upload build artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: obsidian-leetcode-${{ github.sha }}
          path: |
            main.js
            manifest.json
            styles.css
          if-no-files-found: ignore
